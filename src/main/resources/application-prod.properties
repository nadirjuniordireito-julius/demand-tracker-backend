# Perfil produção: segurança e observabilidade
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.com.demandtracker=INFO
logging.level.com.demandtracker.config.RequestLoggingFilter=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Segurança
app.security.headers.strict-transport=true
app.rate-limit.login.max-attempts=5
app.rate-limit.login.window-seconds=60

# H2 console desabilitado (não expor em produção)
# Remover /h2-console/** do permitAll requer alteração em SecurityConfig por perfil
