# Server
server.port=8082
spring.application.name=julius

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/julius
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=julius
spring.datasource.password=julius

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=demand-tracker-secret-key-change-in-production-environment-minimum-256-bits
jwt.expiration=3600000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080

# Logging
logging.level.com.demandtracker=DEBUG
logging.level.org.springframework.security=DEBUG
