# Server
server.port=8082
spring.application.name=julius

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/julius
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=julius
spring.datasource.password=julius
# HikariCP (pool de conexões)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway: permite subir em banco já existente (cria flyway_schema_history e faz baseline)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
jwt.secret=demand-tracker-secret-key-change-in-production-environment-minimum-256-bits
jwt.expiration=3600000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080

# Multipart File Upload - Limites aumentados para templates DOCX e PDFs
# 50MB por arquivo individual
spring.servlet.multipart.max-file-size=50MB
# 50MB para o request completo
spring.servlet.multipart.max-request-size=50MB
# Habilita multipart
spring.servlet.multipart.enabled=true

# Logging (DEBUG apenas em desenvolvimento; use perfil prod em produção)
logging.level.root=WARN
logging.level.com.demandtracker=INFO
logging.level.org.springframework.security=WARN
# Inclui correlationId no log quando disponível (MDC)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n

# Segurança e rate limit (valores padrão)
app.security.headers.strict-transport=false
app.rate-limit.login.max-attempts=5
app.rate-limit.login.window-seconds=60

# Actuator: health e metrics (endpoints não alteram API pública)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
